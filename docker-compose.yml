version: '3.8'

services:
  buprop-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buprop-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:cached
      - ./storage:/var/www/html/storage:delegated
      - ./bootstrap/cache:/var/www/html/bootstrap/cache:delegated
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    environment:
      - DB_HOST=buprop-db
      - DB_DATABASE=buprop
      - DB_USERNAME=buprop_user
      - DB_PASSWORD=buprop_pass
    depends_on:
      - buprop-db
      - buprop-redis
    networks:
      - buprop-network

  buprop-redis:
    image: redis:7-alpine
    container_name: buprop-redis
    ports:
      - "6380:6379"
    networks:
      - buprop-network

  buprop-db:
    image: postgres:15-alpine
    container_name: buprop-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: buprop
      POSTGRES_USER: buprop_user
      POSTGRES_PASSWORD: buprop_pass
    volumes:
      - buprop-db-data:/var/lib/postgresql/data
    networks:
      - buprop-network

  buprop-node:
    image: node:18-alpine
    container_name: buprop-node
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5174:5173"
    networks:
      - buprop-network

volumes:
  buprop-db-data:
  vendor:
  node_modules:

networks:
  buprop-network:
    driver: bridge