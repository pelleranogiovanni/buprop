version: '3.8'

services:
  mi-alquiler-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mi-alquiler-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:cached
      - ./storage:/var/www/html/storage:delegated
      - ./bootstrap/cache:/var/www/html/bootstrap/cache:delegated
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    environment:
      - DB_HOST=mi-alquiler-db
      - DB_DATABASE=mi_alquiler
      - DB_USERNAME=mi_alquiler_user
      - DB_PASSWORD=mi_alquiler_pass
    depends_on:
      - mi-alquiler-db
      - mi-alquiler-redis
    networks:
      - mi-alquiler-network

  mi-alquiler-redis:
    image: redis:7-alpine
    container_name: mi-alquiler-redis
    ports:
      - "6380:6379"
    networks:
      - mi-alquiler-network

  mi-alquiler-db:
    image: postgres:15-alpine
    container_name: mi-alquiler-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: mi_alquiler
      POSTGRES_USER: mi_alquiler_user
      POSTGRES_PASSWORD: mi_alquiler_pass
    volumes:
      - mi-alquiler-db-data:/var/lib/postgresql/data
    networks:
      - mi-alquiler-network

  mi-alquiler-node:
    image: node:18-alpine
    container_name: mi-alquiler-node
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5174:5173"
    networks:
      - mi-alquiler-network

volumes:
  mi-alquiler-db-data:
  vendor:
  node_modules:

networks:
  mi-alquiler-network:
    driver: bridge